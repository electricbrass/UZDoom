on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      os_image:
        required: true
        type: string
      deps_cmdline:
        required: true
        type: string
      build_opts:
        required: true
        type: string
      extra_files:
        required: true
        type: string
        # s[n]   = output file
        # s[n+1] = resource sha256
        # s[n+2] = resource url
      build_type:
        required: true
        type: string
    secrets:
      MACOS_CERTIFICATE:
        required: false
      MACOS_CERTIFICATE_PASSWORD:
        required: false
      MACOS_CERTIFICATE_ID:
        required: false
      LINUX_CERTIFICATE:
        required: false
      LINUX_CERTIFICATE_ID:
        required: false

jobs:
  run_build:
    name: ${{ inputs.name }} ${{ inputs.build_type }}
    runs-on: ${{ inputs.os }}
    container:
      image: ${{ inputs.os_image }}
      options: --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor:unconfined
    defaults:
      run:
        shell: ${{ contains(inputs.name, 'MinGW') && 'msys2 {0}' || 'bash' }}

    steps:
    - name: Dump Event
      shell: bash
      env:
        EVENT: ${{ toJson(github) }}
      run: echo "${EVENT}"

    - name: Prepare Container
      if: runner.os == 'Linux'
      run: |
        # Containers are lean and may not have packages required by early steps
        elevated() { if [ "$EUID" -ne 0 ]; then sudo "$@"; else "$@"; fi; }

        if which apt-get; then
          elevated apt-get -q update
          elevated apt-get -q install -y curl file git gh python3 sudo tree
        fi
        # fixed dubious ownership issue in a container
        git config --global --add safe.directory $GITHUB_WORKSPACE

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Fix Timestamps
      uses: chetan/git-restore-mtime-action@v2

      # To disable caching, add exceptions to the if statement here
      # Re-running a workflow will also disable the cache
    - name: Restore Cache
      if: github.event_name != 'pull_request'
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: build
        key: ${{ github.repository }}/${{ github.ref }}/${{ inputs.name }}/${{ inputs.build_type }}

    - name: Test Cache
      id: cached
      shell: bash
      run: |
        if [[ "${{ steps.cache.conclusion }}" == "skipped" ]]; then
          status=skipped
        elif [[ ${{github.run_attempt}} != 1 ]]; then
          status=dropped
        elif [[ -z "${{ steps.cache.outputs.cache-hit }}" ]]; then
          status=missing
        else
          status=okay
        fi
        echo "Cache ${status}"
        echo "status=${status}" >> "$GITHUB_OUTPUT"
        if [[ "${status}" != "okay" ]]; then
          echo "Clearing cache"
          rm -rf build
        fi

    - name: Setup MSVC
      if: runner.os == 'Windows' && !contains(inputs.name, 'MinGW')
      uses: ilammy/msvc-dev-cmd@v1 # FIXME: update this

    - name: Setup MSYS2
      if: runner.os == 'Windows' && contains(inputs.name, 'MinGW')
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true

    - name: Dependencies
      env:
        DEPS_COMMAND: ${{ inputs.deps_cmdline }}
        EXTRA_FILES: ${{ inputs.extra_files }}
      run: |
        mkdir -p build && cd build

        attempt() (
          set +e
          local cmd="$*"
          local delay=10
          local timeout_sec=600
          for i in {1..4}; do
            echo "Running: $cmd"
            bash -c "$cmd" &
            local cmd_pid=$!

            ( sleep 600 ; kill -9 "$cmd_pid" 2>&1 ; ) &
            local watchdog_pid=$!

            wait "$cmd_pid" 2>&1
            local exit_code=$?

            kill "$watchdog_pid" 2>&1
            wait "$watchdog_pid" 2>&1

            [ $exit_code -eq 0 ] && return 0
            echo "::warning ::Attempt $i failed. Retrying in ${delay}s" >&2
            sleep "${delay}"
            ((delay*=3))
          done
          return 1
        )

        echo ::group::Files
        files=( $EXTRA_FILES )
        for ((i=2;i<=${#files[@]};i+=3)); do
          file="${files[i-2]}"
          hash="${files[i-1]}"
          addr="${files[i]}"
          download="curl -fL '${addr}' | tee '${file}' | sha256sum"
          if [[ "${hash}" == '-' ]]; then
            echo "::warning ::Skipping Checksum for ${file}"
            verify="true"
          else
            verify="echo '${hash} ${file}' | sha256sum -c -"
            if [ -f "$file" ]; then
              printf 'found: %s\n' "$(sha256sum "${file}")"
              if $verify ; then
                echo Skipping
                continue
              else
                echo Downloading
                rm "${file}"
              fi
            fi
          fi
          attempt "set -o pipefail; { $download ; } && { $verify ; }"
        done
        echo ::endgroup::

        echo ::group::Command
        command=( $DEPS_COMMAND )
        command="${command[*]}"
        if [[ -n "$command" ]]; then
          attempt "$command"
        fi
        echo ::endgroup::

        echo ::group::List
        cd ..
        git status || true
        find build -ls || true
        echo ::endgroup::

    - name: Build
      id: build
      env:
        CACHED: ${{ steps.cached.outputs.status }}
        BUILD_TYPE: ${{ inputs.build_type }}
        BUILD_OPTS: ${{ inputs.build_opts }}
      run: |
        export GIT_DESCRIBE="$(git describe --tags --exclude x-*)"
        echo "This will be $GIT_DESCRIBE"
        echo "version=$GIT_DESCRIBE" >> "$GITHUB_OUTPUT"

        config () { cmake -B build -S . -DPK3_QUIET_ZIPDIR=ON -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE $BUILD_OPTS ; }
        build () { cmake --build build --config $BUILD_TYPE ; }

        if [[ "$CACHED" == "okay" ]] ; then
          echo 'Cache hit. Trying quick config'
          echo ::group::Config
          if ! config ; then
            echo ::endgroup::
            echo '::warning ::Quick config failed. Cleaning up and re-trying'
            echo ::group::Config
            rm -rf build/CMakeFiles build/CMakeCache.txt
            config
          fi
          echo ::endgroup::
        else
          echo 'Configuring'
          echo ::group::Config
          config
          echo ::endgroup::
        fi

        if [[ "$CACHED" == "okay" ]] ; then
          echo 'Cache hit. Trying quick build'
          echo ::group::Build
          if ! build ; then
            echo ::endgroup::
            echo '::warning ::Quick build failed. Cleaning up and re-trying'
            echo ::group::Config
            cmake --build build --target clean
            rm -rf build/CMakeFiles build/CMakeCache.txt
            config
            echo ::endgroup::
            echo ::group::Build
            build
          fi
          echo ::endgroup::
        else
          echo 'Building'
          echo ::group::Build
          build
          echo ::endgroup::
        fi

    - name: Pre Package
      id: package
      shell: bash
      working-directory: build
      run: |
        mkdir package
        7z a package/licenses.zip ../docs/licenses/*

        echo "name=${{ runner.os }}-$(uname -m)-UZDoom-${{ steps.build.outputs.version }}" >> "$GITHUB_OUTPUT"

    - name: Package Windows
      if: runner.os == 'Windows'
      shell: bash
      working-directory: build
      env:
        NAME: ${{ steps.package.outputs.name }}
      run: |
        if [[ -f oalsoft.zip ]]; then
          unzip -j oalsoft.zip openal-soft-1.23.1-bin/bin/Win64/soft_oal.dll -d package
        fi
        if [[ -f sndfile.zip ]]; then
          unzip -j sndfile.zip libsndfile-1.2.2-win64/bin/sndfile.dll -d package
        fi

        rm -rf soundfonts fm_banks

        mkdir -p package/soundfonts
        cp -f ../soundfont/uzdoom.sf2 package/soundfonts

        mkdir -p package/fm_banks
        cp -f ../fm_banks/GENMIDI.GS.wopl ../fm_banks/gs-by-papiezak-and-sneakernets.wopn package/fm_banks

        mv -f uzdoom.exe *.pk3 package

        cd package
        7z a -sdel -r "${NAME}.zip" *
        cd ..

    - name: Package macOS
      if: runner.os == 'macOS'
      shell: bash
      working-directory: build
      env:
        NAME: ${{ steps.package.outputs.name }}
      run: |
        if [[ ! -d uzdoom.app ]] && [[ -d ${{ inputs.build_type }}/uzdoom.app ]]; then
          mv ${{ inputs.build_type }}/uzdoom.app uzdoom.app
        fi

        app=UZDoom.app
        mv uzdoom.app ${app}
        mv package/licenses.zip ${app}/Contents/Resources

        if dsymutil ${app}/Contents/MacOS/uzdoom; then
          mv ${app}/Contents/MacOS/uzdoom.dSYM ${app}/Contents/Resources/
        fi

        SIGN_ID="-"
        SIGN_OPTS=""

        if [[ -n "${{ secrets.MACOS_CERTIFICATE }}" ]]; then
          echo "${{ secrets.MACOS_CERTIFICATE }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          SIGN_ID="${{ secrets.MACOS_CERTIFICATE_ID }}"
          SIGN_OPTS="--options=runtime"
        else
          echo "::warning ::Self-signing application"
        fi

        mkdir -p ${app}/Contents/Frameworks
        cp $(brew --prefix molten-vk)/lib/libMoltenVK.dylib ${app}/Contents/Frameworks/
        dylibbundler -ns -of -cd -b \
          -x ./${app}/Contents/MacOS/uzdoom \
          -d ./${app}/Contents/Frameworks \
          -p @executable_path/../Frameworks/

        xattr -cr ${app}

        find ${app}/Contents/Frameworks -type f -name "*.dylib" -print0 | while IFS= read -r -d '' file; do
          codesign --remove-signature "$file"
          codesign --force $SIGN_OPTS -s "$SIGN_ID" "$file"
        done

        /usr/bin/codesign --force --deep $SIGN_OPTS -s "$SIGN_ID" ${app} -v

        $(brew --prefix python)/bin/python3 -m venv venv
        source venv/bin/activate
        pip install dmgbuild
        dmgbuild -s ../tools/dmgbuild-settings.py -D app=${app} "UZDoom" UZDoom.dmg
        mv UZDoom.dmg package

        cd ..

    - name: Package Linux
      if: runner.os == 'Linux'
      shell: bash
      working-directory: build
      env:
        NAME: ${{ steps.package.outputs.name }}
        GIT_DESCRIBE: ${{ steps.build.outputs.version }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        TAG: latest
      run: |
        appdir=AppDir
        pfx=$(realpath $appdir)/usr
        arch=$(uname -m)
        mkdir $appdir

        cmake --install . --prefix "${pfx}"

        # this is actually in the correct place, but the appimage linter complains
        # copying it for now, just in case some tooling wants it there
        mv "${pfx}/share/metainfo/org.zdoom.UZDoom.metainfo.xml" "${pfx}/share/metainfo/org.zdoom.UZDoom.appdata.xml"

        # cleanup
        {
          find "${pfx}" -type f \( -iname \*.a -o -iname \*.h -o -iname \*.cmake \) -print -delete
          find "${pfx}" -type d -empty -delete -print
        } | xargs printf 'deleting: %s\n'

        # https://github.com/linuxdeploy/linuxdeploy-plugin-appimage
        export LDAI_UPDATE_INFORMATION="gh-releases-zsync|${OWNER}|${REPO}|${TAG}|Linux-UZDoom-*-${arch}.AppImage.zsync"
        export LDAI_RUNTIME_FILE=./appimage-runtime

        # our metainfo file is correct, but for some reason the checker crashes on it
        export LDAI_NO_APPSTREAM=1

        if [[ -n "${{ secrets.LINUX_CERTIFICATE }}" ]]; then
          if [[ -n "${{ secrets.LINUX_CERTIFICATE_ID }}" ]]; then
            export LDAI_SIGN_KEY="${{ secrets.LINUX_CERTIFICATE_ID }}"
            export LDAI_SIGN=1
            echo "${{ secrets.LINUX_CERTIFICATE }}" | gpg --import
          else
            echo "::error ::Certificate defined, but no ID given"
          fi
        else
          echo "::warning ::Not signing"
        fi

        chmod +x linuxdeploy
        ./linuxdeploy --output appimage \
          --appdir $appdir \
          --executable="${pfx}/bin/uzdoom" \
          --desktop-file="${pfx}/share/applications/org.zdoom.UZDoom.desktop" \
          --icon-file="${pfx}/share/icons/hicolor/scalable/apps/org.zdoom.UZDoom.svg"

        mv *.AppImage "package/${NAME}.AppImage"

        rm package/licenses.zip

    - name: List
      if: always()
      shell: bash
      run: |
        git status || true
        find build -ls || true

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        path: build/package
        name: ${{ inputs.name }} ${{ inputs.build_type }}

    - name: Prepare Cache
      if: steps.cached.outputs.status != 'skipped'
      shell: bash
      run: |
        # clean up stuff we don't want cached
        # mainly stuff from packaging steps
        rm -rf build/AppDir build/package build/*.app
        sync

      # https://github.com/actions/cache/issues/342
    - name: Clear Cache
      if: steps.cached.outputs.status != 'skipped' && steps.cached.outputs.status != 'missing'
      env:
        GITHUB_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        KEY: ${{ steps.cache.outputs.cache-primary-key }}
      shell: bash
      run: |
        gh api --method DELETE "/repos/${REPO}/actions/caches?key=${KEY// /%20}"
        sleep 5

    - name: Save Cache
      if: steps.cached.outputs.status != 'skipped'
      uses: actions/cache/save@v5
      with:
        path: build
        key: ${{ steps.cache.outputs.cache-primary-key }}
