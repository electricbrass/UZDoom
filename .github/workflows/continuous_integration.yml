name: Continuous Integration

on: [push, pull_request]

jobs:
  ci-success:
    needs:
      - debinfo
      - extra
    if: always()
    runs-on: ubuntu-latest
    name: CI Success
    steps:
      - name: Check Status
        run: |
          [[ "${{ contains(needs.*.result, 'failure') }}" == "false" ]] || exit 1
          [[ "${{ contains(needs.*.result, 'cancelled') }}" == "false" ]] || exit 1

  debinfo:
    name: ${{ matrix.config.name }} ${{ matrix.config.build_type }}
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      build_type: RelWithDebInfo
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
    strategy:
      fail-fast: false
      matrix:
        # these are shared between multiple build configs
        config: &common_config
          - name: Windows
            os: windows-latest
            build_opts: &windows_opts -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl
            build_opts_extra: ""
            deps_cmdline: &windows_deps |
              choco install \
                tree

          - name: MacOS
            os: macos-latest
            build_opts: &mac_opts -DHAVE_VULKAN=ON -DHAVE_GLES2=OFF -DDYN_OPENAL=OFF
            build_opts_extra: -DOPENAL_INCLUDE_DIR=/opt/homebrew/opt/openal-soft/include/AL -DOPENAL_LIBRARY=/opt/homebrew/opt/openal-soft/lib/libopenal.dylib
            deps_cmdline: &mac_deps |
              brew install   \
                dylibbundler \
                fluid-synth  \
                openal-soft  \
                vulkan-volk  \
                molten-vk    \
                libvpx       \
                sdl2         \
                tree

          - name: Linux
            os: ubuntu-latest
            build_opts: &linux_opts
            build_opts_extra: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
            deps_cmdline: &linux_deps |
              sudo apt-get update && sudo apt-get install \
                libopenal-dev \
                waylandpp-dev \
                libsdl2-dev   \
                libwebp-dev   \
                libbz2-dev    \
                libomp-dev    \
                libvpx-dev    \
                libfuse2

  extra:
    name: ${{ matrix.config.name }}
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
      build_type: ${{ matrix.config.build_type }}
    strategy:
      fail-fast: false
      matrix:
        config: # put bespoke configs here
          - name: Linux GCC # I'm just here to make sure GCC doesn't break
            os: ubuntu-latest
            build_opts: *linux_opts
            build_opts_extra: ""
            deps_cmdline: *linux_deps
            build_type: RelWithDebInfo

  optional:
    name: ${{ matrix.config.name }}
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
      build_type: ${{ matrix.config.build_type }}
    strategy:
      fail-fast: false
      matrix:
        config: # put bespoke configs here
          - name: Windows ARM (Testing)
            os: windows-11-arm
            build_opts: *windows_opts
            build_opts_extra: ""
            deps_cmdline: *windows_deps
            build_type: RelWithDebInfo

          - name: Windows MinGW GCC
            os: windows-latest
            build_opts: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
            build_opts_extra: -DFORCE_NO_LTO=true
            deps_cmdline: &mingw_deps |
              pacman -S --noconfirm --needed \
                mingw-w64-x86_64-openal \
                mingw-w64-x86_64-libvpx \
                mingw-w64-x86_64-cmake  \
                mingw-w64-x86_64-ninja  \
                mingw-w64-x86_64-bzip2  \
                mingw-w64-x86_64-clang  \
                mingw-w64-x86_64-gcc
            build_type: RelWithDebInfo

          - name: Windows MinGW Clang
            os: windows-latest
            build_opts: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
            build_opts_extra: ""
            deps_cmdline: *mingw_deps
            build_type: RelWithDebInfo

          - name: Linux ARM (Testing)
            os: ubuntu-24.04-arm
            build_opts: *linux_opts
            build_opts_extra: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
            deps_cmdline: *linux_deps
            build_type: RelWithDebInfo

          - name: MacOS Intel (Testing)
            os: macos-26-intel
            build_opts: *mac_opts
            build_opts_extra: -DOPENAL_INCLUDE_DIR=/usr/local/opt/openal-soft/include/AL -DOPENAL_LIBRARY=/usr/local/opt/openal-soft/lib/libopenal.dylib
            deps_cmdline: *mac_deps
            build_type: RelWithDebInfo

# ======================

  release:
    name: ${{ matrix.config.name }} ${{ matrix.config.build_type }}
    needs: ci-success
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      build_type: Release
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra || '' }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
    strategy:
      fail-fast: false
      matrix:
        config: *common_config

  debug:
    name: ${{ matrix.config.name }} ${{ matrix.config.build_type }}
    needs: ci-success
    uses: ./.github/workflows/build_core.yml
    secrets: inherit
    with:
      build_type: Debug
      name: ${{ matrix.config.name }}
      os: ${{ matrix.config.os }}
      build_opts: ${{ matrix.config.build_opts }} ${{ matrix.config.build_opts_extra }}
      deps_cmdline: ${{ matrix.config.deps_cmdline }}
    strategy:
      fail-fast: false
      matrix:
        config: *common_config
